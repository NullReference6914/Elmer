# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net
name: .Net Core Builder

on:
  push:
    branches:
      - main # Triggers the workflow on pushes to the main branch
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest # Uses a GitHub-hosted runner with Ubuntu
    permissions:
      contents: write # Required to write releases and upload assets

    steps:
        
    - name: Get current date
      run: echo "NOW=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
      id: set_date # ID to reference this step for outputs (if needed)
      
    - name: Get the repository name
      run: echo "REPO_NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV
      
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
          fetch-depth: 0
          ref: main
    
    - name: Get next version
      uses: reecetech/version-increment@2024.10.1
      id: version
      with:
        scheme: calver
        increment: patch

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Specify your target .NET version

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Publish project (DLL)
      run: dotnet publish --configuration Release --no-build -o ./Publish
      
    #- name: Publish project (Win EXE)
    #  run: dotnet publish --configuration Release --no-build -r win-x64 -o ./PublishWin --self-contained true /p:PublishSingleFile=true
      
    - name: Install zip (if not pre-installed)
      run: sudo apt-get install zip -y
      # Ubuntu runners usually have zip, but this ensures it is available

    - name: Zip DLL
      run: |
        cd ./Publish
        zip -r ../${{env.REPO_NAME}}-Published.zip .
        
    #- name: Zip EXE
    #  run: |
    #    cd ./PublishWin
    #    zip -r ../${{env.REPO_NAME}}_Win-Published.zip .
      
    - name: Upload DLL artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.REPO_NAME}}
        path: ./${{env.REPO_NAME}}-Published.zip 
        
    #- name: Upload WinEXE artifact
    #  uses: actions/upload-artifact@v4
    #  with:
    #    name: ${{env.REPO_NAME}}_Exe
    #    path: ./${{env.REPO_NAME}}_Win-Published.zip 

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.v-version }}
        release_name: ${{env.REPO_NAME}} ${{ env.NOW }}
        draft: true # Create a draft release first to add all assets before publishing
        prerelease: false

    #- name: Upload EXE
    #  uses: actions/upload-release-asset@v1
    #  env:
    #    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #  with:
    #    upload_url: ${{ steps.create_release.outputs.upload_url }} # The URL for uploading assets
    #    asset_path: ${{env.REPO_NAME}}_Win-Published.zip # Path to the file to upload
    #    asset_name: ${{env.REPO_NAME}} EXE.zip # The name for the asset in the release
    #    asset_content_type: application/zip

    - name: Upload DLL
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }} # The URL for uploading assets
        asset_path: ${{env.REPO_NAME}}-Published.zip # Path to the file to upload
        asset_name: ${{env.REPO_NAME}} DLL.zip # The name for the asset in the release
        asset_content_type: application/zip
